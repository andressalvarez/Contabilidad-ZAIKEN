<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Debug Test</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/tabulator-tables@5.4.4/dist/css/tabulator.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/tabulator-tables@5.4.4/dist/js/tabulator.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="./styles/global.css">
</head>
<body>
    <div class="container mt-4">
        <h1>Debug Sistema</h1>
        <div id="debug-info"></div>
        <div id="main-content"></div>
    </div>

    <!-- Scripts -->
    <script src="./js/config.js"></script>
    <script src="./js/templates.js"></script>
    <script src="./js/data-manager.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/calculations.js"></script>
    <script src="./js/navigation.js"></script>
    <script src="./js/views/dashboard.js"></script>
    <script src="./js/app.js"></script>

    <script>
        console.log('=== INICIO DEBUG ===');

        // Verificar que todos los módulos estén cargados
        const modules = ['AppConfig', 'Templates', 'DataManager', 'Utils', 'Calculations', 'Navigation', 'DashboardView', 'App'];
        const debugInfo = document.getElementById('debug-info');

        let info = '<h3>Estado de Módulos:</h3><ul>';
        modules.forEach(module => {
            const exists = window[module] !== undefined;
            info += `<li class="${exists ? 'text-success' : 'text-danger'}">${module}: ${exists ? '✓ Cargado' : '✗ No encontrado'}</li>`;
            if (exists) {
                console.log(`✓ ${module} cargado correctamente`);
            } else {
                console.error(`✗ ${module} NO CARGADO`);
            }
        });
        info += '</ul>';

        debugInfo.innerHTML = info;

        // Intentar inicializar paso a paso
        try {
            console.log('1. Inicializando DataManager...');
            DataManager.init();
            console.log('   ✓ DataManager inicializado');

            console.log('2. Cargando template dashboard...');
            const template = Templates.dashboard;
            document.getElementById('main-content').innerHTML = template;
            console.log('   ✓ Template cargado');

            console.log('3. Inicializando DashboardView...');
            DashboardView.init();
            console.log('   ✓ DashboardView inicializado');

            console.log('=== ÉXITO: Todo funcionando ===');

        } catch (error) {
            console.error('=== ERROR ===', error);
            debugInfo.innerHTML += `<div class="alert alert-danger mt-3">Error: ${error.message}</div>`;
        }
    </script>
</body>
</html>
