<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Gestión Completo - Modular</title>

    <!-- Bootstrap (para tooltips e íconos) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tabulator CSS y JS -->
    <link href="https://cdn.jsdelivr.net/npm/tabulator-tables@5.4.4/dist/css/tabulator.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/tabulator-tables@5.4.4/dist/js/tabulator.min.js"></script>

    <!-- Chart.js para gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Estilos globales -->
    <link rel="stylesheet" href="./styles/global.css">
</head>
<body class="bg-gray-50 font-sans">
    <div class="min-h-screen">
        <!-- Header -->
        <header class="bg-white shadow-sm border-b">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center py-4">
                    <div class="flex items-center gap-3">
                        <img src="./assets/zaiken.png" alt="Logo" class="h-10 w-10 rounded-full shadow" />
                        <h1 class="text-2xl font-bold text-gray-900">Sistema de Gestión: ZAIKEN</h1>
                    </div>
                    <div class="flex items-center space-x-4">
                        <!-- Botón para colapsar sidebar en móviles -->
                        <button id="sidebarToggle" class="lg:hidden p-2 rounded-lg bg-gray-100 hover:bg-gray-200 transition-colors">
                            <i class="bi bi-list"></i>
                        </button>
                        <!-- Indicador de última vista -->
                        <div id="lastViewIndicator" class="hidden sm:flex items-center text-sm text-gray-600 bg-gray-100 px-3 py-1 rounded-lg">
                            <i class="bi bi-clock-history mr-2"></i>
                            <span id="lastViewText">Última vista guardada</span>
                        </div>
                        <button id="darkModeToggle" class="p-2 rounded-lg bg-gray-100 hover:bg-gray-200 transition-colors">
                            <i class="bi bi-moon-fill"></i>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex">
            <!-- Sidebar -->
            <aside id="sidebar" class="h-screen sticky top-0 overflow-y-auto">
                <nav>
                    <div class="nav-group">
                        <h3 class="nav-group-title">Principal</h3>
                        <ul class="space-y-1">
                            <li><a href="#" data-tab="dashboard" class="nav-link active">
                                <i class="bi bi-grid-1x2-fill"></i>
                                <span>Dashboard</span>
                            </a></li>
                        </ul>
                    </div>

                    <div class="nav-group">
                        <h3 class="nav-group-title">Gestión de Personal</h3>
                        <ul class="space-y-1">
                            <li><a href="#" data-tab="personas" class="nav-link">
                                <i class="bi bi-people-fill"></i>
                                <span>Personas</span>
                            </a></li>
                            <li><a href="#" data-tab="roles" class="nav-link">
                                <i class="bi bi-person-badge-fill"></i>
                                <span>Roles</span>
                            </a></li>
                            <li><a href="#" data-tab="valorHora" class="nav-link">
                                <i class="bi bi-clock-fill"></i>
                                <span>Valor Hora</span>
                            </a></li>
                            <li><a href="#" data-tab="registroHoras" class="nav-link">
                                <i class="bi bi-calendar2-check-fill"></i>
                                <span>Registro Horas</span>
                            </a></li>
                        </ul>
                    </div>

                    <div class="nav-group">
                        <h3 class="nav-group-title">Operaciones</h3>
                        <ul class="space-y-1">
                            <li><a href="#" data-tab="campanas" class="nav-link">
                                <i class="bi bi-receipt"></i>
                                <span>Gastos</span>
                            </a></li>
                            <li><a href="#" data-tab="transacciones" class="nav-link">
                                <i class="bi bi-wallet2"></i>
                                <span>Transacciones</span>
                            </a></li>
                            <li><a href="#" data-tab="categorias" class="nav-link">
                                <i class="bi bi-tags-fill"></i>
                                <span>Categorías</span>
                            </a></li>
                        </ul>
                    </div>

                    <div class="nav-group">
                        <h3 class="nav-group-title">Distribución</h3>
                        <ul class="space-y-1">
                            <li><a href="#" data-tab="distribucionUtilidades" class="nav-link">
                                <i class="bi bi-pie-chart-fill"></i>
                                <span>Distribución Utilidades</span>
                            </a></li>
                            <li><a href="#" data-tab="distribucionDetalle" class="nav-link">
                                <i class="bi bi-list-check"></i>
                                <span>Distribución Detalle</span>
                            </a></li>
                        </ul>
                    </div>
                </nav>
            </aside>

            <!-- Main Content -->
            <main class="flex-1 p-6">
                <div id="main-content">
                    <!-- Las vistas se cargarán aquí dinámicamente -->
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts del sistema -->
    <script src="./js/config.js"></script>
    <script src="./js/templates.js"></script>
    <script src="./js/data-manager.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/calculations.js"></script>
    <script src="./js/navigation.js"></script>

    <!-- Scripts de vistas -->
    <script src="./js/views/dashboard.js"></script>
    <script src="./js/views/personas.js"></script>
    <script src="./js/views/roles.js"></script>
    <script src="./js/views/valor-hora.js"></script>
    <script src="./js/views/registro-horas.js"></script>
    <script src="./js/views/campanas.js"></script>
    <script src="./js/views/transacciones.js"></script>
    <script src="./js/views/categorias.js"></script>
    <script src="./js/views/distribucion-utilidades.js"></script>
    <script src="./js/views/distribucion-detalle.js"></script>

    <!-- Aplicación principal -->
    <script src="./js/app.js"></script>

    <!-- Script para manejo responsive del sidebar -->
    <script>
        // Manejo del sidebar responsive
        document.addEventListener('DOMContentLoaded', function() {
            const sidebarToggle = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('sidebar');
            const lastViewIndicator = document.getElementById('lastViewIndicator');
            const lastViewText = document.getElementById('lastViewText');

            if (sidebarToggle && sidebar) {
                sidebarToggle.addEventListener('click', function() {
                    sidebar.classList.toggle('collapsed');

                    // Cambiar ícono
                    const icon = sidebarToggle.querySelector('i');
                    if (sidebar.classList.contains('collapsed')) {
                        icon.className = 'bi bi-x-lg';
                    } else {
                        icon.className = 'bi bi-list';
                    }
                });
            }

            // Cerrar sidebar al hacer clic en un enlace en móviles
            const navLinks = document.querySelectorAll('.nav-link');
            navLinks.forEach(link => {
                link.addEventListener('click', function() {
                    if (window.innerWidth <= 768) {
                        sidebar.classList.add('collapsed');
                        const icon = sidebarToggle.querySelector('i');
                        icon.className = 'bi bi-list';
                    }
                });
            });

            // Manejar resize de ventana
            window.addEventListener('resize', function() {
                if (window.innerWidth > 768) {
                    sidebar.classList.remove('collapsed');
                    const icon = sidebarToggle.querySelector('i');
                    icon.className = 'bi bi-list';
                }
            });

            // Función para actualizar el indicador de última vista
            function updateLastViewIndicator() {
                if (window.Navigation && lastViewIndicator && lastViewText) {
                    const lastViewInfo = window.Navigation.getLastViewInfo();
                    if (lastViewInfo && lastViewInfo.isValid) {
                        lastViewText.textContent = `Última: ${lastViewInfo.viewTitle}`;
                        lastViewIndicator.classList.remove('hidden');

                        // Agregar tooltip con información adicional
                        lastViewIndicator.title = `Vista actual: ${window.Navigation.getCurrentView()}\nÚltima vista guardada: ${lastViewInfo.viewName}`;
                    } else {
                        lastViewIndicator.classList.add('hidden');
                    }
                }
            }

            // Actualizar indicador cuando se carga la página
            setTimeout(updateLastViewIndicator, 1000);

            // Actualizar indicador cuando cambia la vista
            const originalLoadView = window.Navigation.loadView;
            if (originalLoadView) {
                window.Navigation.loadView = function(viewName) {
                    const result = originalLoadView.call(this, viewName);
                    setTimeout(updateLastViewIndicator, 500);
                    return result;
                };
            }

            // Mostrar información de debug en consola (solo en desarrollo)
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                console.log('💡 Tip: Usa Navigation.debugNavigationSystem() para ver información del sistema de navegación');
                console.log('💡 Tip: Usa Navigation.getLastViewInfo() para ver la última vista guardada');
            }
        });
    </script>
</body>
</html>
