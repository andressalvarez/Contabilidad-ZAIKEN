<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Sistema de Gestión Completo - Modular</title>

    <!-- Bootstrap (para tooltips e íconos) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tabulator CSS y JS -->
    <link href="https://cdn.jsdelivr.net/npm/tabulator-tables@5.4.4/dist/css/tabulator.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/tabulator-tables@5.4.4/dist/js/tabulator.min.js"></script>

    <!-- Chart.js para gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Estilos globales -->
    <link rel="stylesheet" href="./styles/global.css">
</head>
<body class="bg-gray-50 font-sans">
    <div class="min-h-screen">
        <!-- Header -->
        <header class="bg-white shadow-sm border-b">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center py-4">
                    <div class="flex items-center gap-3">
                        <img src="./assets/zaiken.png" alt="Logo" class="h-10 w-10 rounded-full shadow" />
                        <h1 class="text-2xl font-bold text-gray-900">Sistema de Gestión: ZAIKEN</h1>
                    </div>
                    <div class="flex items-center space-x-4">
                        <button id="darkModeToggle" class="p-2 rounded-lg bg-gray-100 hover:bg-gray-200 transition-colors">
                            <i class="bi bi-moon-fill"></i>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex">
            <!-- Sidebar -->
            <aside class="h-screen sticky top-0 overflow-y-auto">
                <nav>
                    <div class="nav-group">
                        <h3 class="nav-group-title">Principal</h3>
                        <ul class="space-y-1">
                            <li><a href="#" data-tab="dashboard" class="nav-link active">
                                <i class="bi bi-grid-1x2-fill"></i>
                                <span>Dashboard</span>
                            </a></li>
                        </ul>
                    </div>

                    <div class="nav-group">
                        <h3 class="nav-group-title">Gestión de Personal</h3>
                        <ul class="space-y-1">
                            <li><a href="#" data-tab="personas" class="nav-link">
                                <i class="bi bi-people-fill"></i>
                                <span>Personas</span>
                            </a></li>
                            <li><a href="#" data-tab="roles" class="nav-link">
                                <i class="bi bi-person-badge-fill"></i>
                                <span>Roles</span>
                            </a></li>
                            <li><a href="#" data-tab="valorHora" class="nav-link">
                                <i class="bi bi-clock-fill"></i>
                                <span>Valor Hora</span>
                            </a></li>
                            <li><a href="#" data-tab="registroHoras" class="nav-link">
                                <i class="bi bi-calendar2-check-fill"></i>
                                <span>Registro Horas</span>
                            </a></li>
                        </ul>
                    </div>

                    <div class="nav-group">
                        <h3 class="nav-group-title">Operaciones</h3>
                        <ul class="space-y-1">
                            <li><a href="#" data-tab="campanas" class="nav-link">
                                <i class="bi bi-receipt"></i>
                                <span>Gastos</span>
                            </a></li>
                            <li><a href="#" data-tab="transacciones" class="nav-link">
                                <i class="bi bi-wallet2"></i>
                                <span>Transacciones</span>
                            </a></li>
                            <li><a href="#" data-tab="categorias" class="nav-link">
                                <i class="bi bi-tags-fill"></i>
                                <span>Categorías</span>
                            </a></li>
                        </ul>
                    </div>

                    <div class="nav-group">
                        <h3 class="nav-group-title">Distribución</h3>
                        <ul class="space-y-1">
                            <li><a href="#" data-tab="distribucionUtilidades" class="nav-link">
                                <i class="bi bi-pie-chart-fill"></i>
                                <span>Distribución Utilidades</span>
                            </a></li>
                            <li><a href="#" data-tab="distribucionDetalle" class="nav-link">
                                <i class="bi bi-list-check"></i>
                                <span>Distribución Detalle</span>
                            </a></li>
                        </ul>
                    </div>
                </nav>
            </aside>

            <!-- Main Content -->
            <main class="flex-1 p-6">
                <div id="main-content">
                    <!-- Las vistas se cargarán aquí dinámicamente -->
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts del sistema -->
    <script src="./js/config.js"></script>
    <script src="./js/templates.js"></script>
    <script src="./js/data-manager.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/calculations.js"></script>
    <script src="./js/navigation.js"></script>

    <!-- Scripts de vistas -->
    <script src="./js/views/dashboard.js"></script>
    <script src="./js/views/personas.js"></script>
    <script src="./js/views/roles.js"></script>
    <script src="./js/views/valor-hora.js"></script>
    <script src="./js/views/registro-horas.js"></script>
    <script src="./js/views/campanas.js"></script>
    <script src="./js/views/transacciones.js"></script>
    <script src="./js/views/categorias.js"></script>
    <script src="./js/views/distribucion-utilidades.js"></script>
    <script src="./js/views/distribucion-detalle.js"></script>

    <!-- Aplicación principal -->
    <script src="./js/app.js"></script>
</body>
</html>
